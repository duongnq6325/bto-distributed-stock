version: '3.8'
services:
  site1_db:
    image: mysql:8.0
    container_name: bto_site1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stock_db
    ports:
      - "3301:3306"
    command: --default-authentication-plugin=mysql_native_password

  site2_db:
    image: mysql:8.0
    container_name: bto_site2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stock_db
    ports:
      - "3302:3306"
    command: --default-authentication-plugin=mysql_native_password